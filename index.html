window.generateTrainingSchedule = () => {
  const f = state.trainingScheduleForm;
  if (f.days.length === 0) { state.error = 'Please select at least one training day.'; render(); return; }
  if (!f.commenceDate || !f.concludeDate) { state.error = 'Please set commence and conclude dates.'; render(); return; }
  if (!f.startTime || !f.finishTime) { state.error = 'Please set start and finish times.'; render(); return; }
  if (f.concludeDate < f.commenceDate) { state.error = 'Conclude date must be after commence date.'; render(); return; }

  // Day name → JS getDay() index (0=Sun)
  const DAY_MAP = { Sun:0, Mon:1, Tue:2, Wed:3, Thu:4, Fri:5, Sat:6 };
  const selectedDayNums = f.days.map(d => DAY_MAP[d]);

  // Helper: format a Date as YYYY-MM-DD in LOCAL time (not UTC)
  function toLocalDateStr(d) {
    const yyyy = d.getFullYear();
    const mm   = String(d.getMonth() + 1).padStart(2, '0');
    const dd   = String(d.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  // Remove existing schedule-generated sessions first
  state.events = state.events.filter(e => !(e.type === 'training' && e.fromSchedule));

  // Parse as local midnight (avoids UTC-shift bug)
  const [sy, sm, sd] = f.commenceDate.split('-').map(Number);
  const [ey, em, ed] = f.concludeDate.split('-').map(Number);
  const start  = new Date(sy, sm - 1, sd);
  const finish = new Date(ey, em - 1, ed);
  const sessions = [];
  const cur = new Date(start);

  while (cur <= finish) {
    if (selectedDayNums.includes(cur.getDay())) {
      const dateStr = toLocalDateStr(cur);
      sessions.push({
        id: 'tr' + dateStr.replace(/-/g,'') + Math.random().toString(36).slice(2,5),
        type: 'training',
        fromSchedule: true,
        title: 'Training Session',
        date: dateStr,
        time: f.startTime,
        finishTime: f.finishTime,
        location: f.location || 'Club Oval — Nets',
        description: '',
        cost: 0,
        rsvp: {},
        cancelled: false,
        cancelNote: '',
        reminder: f.reminder,
      });
    }
    cur.setDate(cur.getDate() + 1);
  }

  state.events.push(...sessions);
  state.error = '';
  // Navigate to Training tab in Events
  state.activeTab = 'events';
  state.eventsTab = 'training';
  state.eventsFilter = 'upcoming';
  state.screen = 'events';
  showToast(`${sessions.length} sessions generated!`);
  render();
};

window.openTrainingSession = (id) => {
  state.modal = { type: 'trainingSession', sessionId: id, notifyCancel: true };
  render();
};

window.toggleModalNotify = () => {
  // Toggle both notify checkboxes in the modal (they share the same notifyCancel flag)
  if (state.modal) state.modal.notifyCancel = !state.modal.notifyCancel;
  render();
};

window.toggleModalCancelNotify = () => {
  if (state.modal) state.modal.notifyCancel = !state.modal.notifyCancel;
  render();
};

window.amendSession = (id) => {
  const ev = state.events.find(e => e.id === id);
  if (!ev) return;
  ev.time       = document.getElementById('ts-modal-start')?.value    || ev.time;
  ev.finishTime = document.getElementById('ts-modal-finish')?.value   || ev.finishTime;
  ev.location   = document.getElementById('ts-modal-location')?.value || ev.location;
  const notify  = state.modal?.notifyCancel !== false;
  state.modal = null;
  if (notify) {
    sendPushNotification(
      `📅 Training Updated: ${formatDate(ev.date)}`,
      `${ev.time}–${ev.finishTime} at ${ev.location}`,
    );
  }
  showToast(notify ? 'Session updated — members notified!' : 'Session updated!');
  render();
};

window.cancelSession = (id) => {
  const ev = state.events.find(e => e.id === id);
  if (!ev) return;
  const note   = document.getElementById('ts-cancel-note')?.value.trim() || '';
  const notify = state.modal?.notifyCancel !== false;
  ev.cancelled  = true;
  ev.cancelNote = note;
  state.modal = null;
  if (notify) {
    sendPushNotification(
      `❌ Training Cancelled: ${formatDate(ev.date)}`,
      note || 'This training session has been cancelled.',
    );
  }
  showToast(notify ? 'Session cancelled — members notified!' : 'Session cancelled.');
  render();
};

window.reinstateSession = (id) => {
  const ev = state.events.find(e => e.id === id);
  if (!ev) return;
  ev.cancelled  = false;
  ev.cancelNote = '';
  state.modal = null;
  showToast('Session reinstated!');
  render();
};

// ── PLAYHQ API PROXY ─────────────────────────────────────────────────────
// In Live mode, requests go through your Cloudflare Worker (avoids CORS).
// Replace the URL below with your deployed Worker URL after setup.
const PLAYHQ_PROXY = 'https://playhq-proxy.thomsonseth.workers.dev';

async function playHQGet(path) {
  const res = await fetch(`${PLAYHQ_PROXY}${path}`);
  if (!res.ok) throw new Error(`PlayHQ API error ${res.status}`);
  return res.json();
}

window.setImportMode = (mode) => {
  state.importFixture.mode = mode;
  state.importFixture.error = '';
  render();
};

window.toggleImportGrade = (id) => {

  if (idx >= 0) ids.splice(idx, 1);

};

window.importFetchSeasons = async () => {
  const s = state.importFixture;
  if (s.mode === 'live' && (!s.apiKey || !s.orgId)) {
    state.importFixture.error = 'Please enter your API Key and Organisation ID.';
    render(); return;
  }
  state.importFixture.loading = true;
  state.importFixture.error = '';
  render();

  try {
    let seasons;
    if (s.mode === 'mock') {
      await new Promise(r => setTimeout(r, 800)); // simulate latency
      seasons = MOCK_PHQ_SEASONS;
    } else {
      const data = await playHQGet(`/v1/organisations/${s.orgId}/seasons`);
      seasons = data.data;
    }
    state.importFixture.seasons = seasons;
    state.importFixture.selectedSeasonId = seasons[0]?.id || '';
    state.importFixture.step = 2;
  } catch(e) {
    state.importFixture.error = `Failed to fetch seasons: ${e.message}`;
  }
  state.importFixture.loading = false;
  render();
};

window.importFetchGrades = async () => {
  const s = state.importFixture;
  if (!s.selectedSeasonId) { state.importFixture.error = 'Please select a season.'; render(); return; }
  state.importFixture.loading = true;
  state.importFixture.error = '';
  render();

  try {
    let grades;
    if (s.mode === 'mock') {
      await new Promise(r => setTimeout(r, 600));
      grades = MOCK_PHQ_GRADES;
    } else {
      const data = await playHQGet(`/v1/seasons/${s.selectedSeasonId}/grades`);
      grades = data.data;
    }
    state.importFixture.grades = grades;
    state.importFixture.selectedGradeIds = [];   // reset multi-select
    state.importFixture.step = 3;
  } catch(e) {
    state.importFixture.error = `Failed to fetch grades: ${e.message}`;
  }
  state.importFixture.loading = false;
  render();
};

window.importFetchFixtures = async () => {
  const s = state.importFixture;
  if (!s.selectedGradeIds.length) { state.importFixture.error = 'Please select at least one grade.'; render(); return; }
  state.importFixture.loading = true;
  state.importFixture.error = '';
  render();

  try {
    const fixturesByGrade = {};
    if (s.mode === 'mock') {
      await new Promise(r => setTimeout(r, 700));
      const seasonData = MOCK_PHQ_FIXTURES[s.selectedSeasonId] || {};
      for (const gradeId of s.selectedGradeIds) {
        const grade = s.grades.find(g => g.id === gradeId);
        fixturesByGrade[gradeId] = {
          name: grade?.name || gradeId,
          fixtures: (seasonData[gradeId] || []),
        };
      }
    } else {
      for (const gradeId of s.selectedGradeIds) {
        const grade = s.grades.find(g => g.id === gradeId);
        const data = await playHQGet(`/v1/grades/${gradeId}/fixture`);
        fixturesByGrade[gradeId] = {
          name: grade?.name || gradeId,
          fixtures: data.data.map(g => ({
            id: g.id,
            round: g.round?.roundNumber,
            homeTeam: g.homeTeam?.name || 'TBC',
            awayTeam: g.awayTeam?.name || 'TBC',
            date: g.dateTime?.split('T')[0] || '',
            time: g.dateTime?.split('T')[1]?.slice(0,5) || '',
            venue: g.venue?.name || 'TBC',
          })),
        };
      }
    }
    state.importFixture.fixturesByGrade = fixturesByGrade;
    // Pre-select all fixtures across all grades
    state.importFixture.selectedFixtureIds = Object.values(fixturesByGrade).flatMap(g => g.fixtures.map(f => f.id));
    state.importFixture.step = 4;
  } catch(e) {
    state.importFixture.error = `Failed to fetch fixtures: ${e.message}`;
  }
  state.importFixture.loading = false;
  render();
};

window.toggleFixtureSelect = (id) => {
  const ids = state.importFixture.selectedFixtureIds;
  const idx = ids.indexOf(id);
  if (idx >= 0) ids.splice(idx, 1);
  else ids.push(id);
  render();
};

window.selectAllFixtures = () => {
  const s = state.importFixture;
  const allIds = Object.values(s.fixturesByGrade).flatMap(g => g.fixtures.map(f => f.id));
  if (s.selectedFixtureIds.length === allIds.length) {
    s.selectedFixtureIds = [];
  } else {
    s.selectedFixtureIds = allIds;
  }
  render();
};

window.toggleAllGradeFixtures = (gradeId) => {
  const s = state.importFixture;
  const gradeFixtures = s.fixturesByGrade[gradeId]?.fixtures || [];
  const gradeIds = gradeFixtures.map(f => f.id);
  const allSel = gradeIds.every(id => s.selectedFixtureIds.includes(id));
  if (allSel) {
    s.selectedFixtureIds = s.selectedFixtureIds.filter(id => !gradeIds.includes(id));
  } else {
    const existing = new Set(s.selectedFixtureIds);
    gradeIds.forEach(id => existing.add(id));
    s.selectedFixtureIds = [...existing];
  }
  render();
};

window.importConfirm = () => {
  const s = state.importFixture;
  let importCount = 0;

  // Iterate all grades and their fixtures
  Object.entries(s.fixturesByGrade).forEach(([gradeId, gradeData]) => {
    const grade = s.grades.find(g => g.id === gradeId);
    gradeData.fixtures
      .filter(f => s.selectedFixtureIds.includes(f.id))
      .forEach(fix => {
        if (state.events.find(e => e.playHQId === fix.id)) return; // skip duplicates
        state.events.push({
          id: 'phq_' + fix.id,
          playHQId: fix.id,
          type: 'match',
          grade: gradeData.name,           // stored for grouping in Matches tab
          gradeId,
          title: `${fix.homeTeam} vs ${fix.awayTeam}`,
          date: fix.date,
          time: fix.time || '10:00',
          location: fix.venue,
          description: `Round ${fix.round || '—'} · ${gradeData.name} · Imported from PlayHQ`,
          cost: 0,
          rsvp: {},
          team: [],
          round: fix.round,
          homeTeam: fix.homeTeam,
          awayTeam: fix.awayTeam,
        });
        importCount++;
      });
  });

  state.events.sort((a, b) => a.date > b.date ? 1 : -1);

  // Smart filter — show upcoming if any, else past
  const allImported = Object.values(s.fixturesByGrade)
    .flatMap(g => g.fixtures)
    .filter(f => s.selectedFixtureIds.includes(f.id));
  state.eventsFilter = allImported.some(f => isUpcoming(f.date)) ? 'upcoming' : 'past';

  // Reset import state
  state.importFixture = {
    apiKey: s.apiKey, orgId: s.orgId, mode: s.mode,
    step: 1, seasons: [], selectedSeasonId: '',
    grades: [], selectedGradeIds: [],
    fixturesByGrade: {}, selectedFixtureIds: [],
    loading: false, error: '',
  };

  state.activeTab = 'events';
  state.eventsTab = 'matches';
  state.screen = 'events';
  showToast(`${importCount} fixture${importCount !== 1 ? 's' : ''} imported!`);
  render();
};

// ── PUSH NOTIFICATIONS (OneSignal via Cloudflare Worker) ─────────────────
// Replace the URL below with your deployed onesignal-worker URL after setup.
// The Worker holds your API keys securely and avoids CORS issues.
const ONESIGNAL_WORKER_URL = 'https://onesignal-proxy.thomsonseth.workers.dev';

// Request permission from the user after they log in
async function requestNotificationPermission() {
  try {
    if (window.OneSignal) {
      await window.OneSignal.Notifications.requestPermission();
    }
  } catch(e) {
    console.log('Notification permission request failed:', e);
  }
}

async function sendPushNotification(title, message, url = '/') {
  if (!ONESIGNAL_WORKER_URL || ONESIGNAL_WORKER_URL.includes('YOUR_SUBDOMAIN')) return;
  try {
    await fetch(ONESIGNAL_WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        included_segments: ['All'],
        headings:  { en: title },
        contents:  { en: message },
        url,
      }),
    });
  } catch(e) {
    console.log('Push notification failed:', e);
  }
}
