  return `<div class="screen">
    ${buildTopBanner({ title: 'Select Team', showBack: true })}
    <div class="screen-scroll">
      <div style="padding:16px;display:flex;flex-direction:column;gap:12px;">
        <div class="selected-count-badge">${count} selected</div>
        ${rows}
        <button class="btn-primary" onclick="publishTeam()">Publish selection</button>
      </div>
    </div>
  </div>`;
}

// ── MESSAGES LIST ─────────────────────────────────────────────────────────
function buildMessages() {
  const threads = getThreadsForUser(state.user.id);

  const threadRows = threads.map(t => {
    const name = getThreadName(t);
    const otherUser = getThreadAvatar(t);
    const last = t.messages[t.messages.length - 1];
    const unread = getUnreadCount(t);
    const preview = last
      ? (last.from === state.user.id ? `You: ${last.text}` : last.text)
      : 'No messages yet';
    const timeStr = formatMsgTime(last?.ts);

    return `<div class="msg-thread" onclick="openChat('${t.id}')">
      ${buildUserAvatarHtml(otherUser, 50)}
      ${unread > 0 ? '<div class="unread-badge"></div>' : ''}
      <div class="msg-info">
        <div class="msg-name">${name}</div>
        <div class="msg-preview ${unread > 0 ? 'unread' : ''}">${preview.substring(0, 45)}${preview.length > 45 ? '…' : ''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;">
        <div class="msg-time">${timeStr}</div>
        ${unread > 0 ? `<div style="background:var(--accent);color:#000;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;">${unread}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  return `<div class="screen">
    ${buildTopBanner()}
    <div class="screen-scroll">
      <div class="messages-content">
        <div class="messages-header">
          <div class="messages-title">Messages</div>
          <button onclick="navigate('newconversation')" style="background:none;border:none;color:var(--accent);cursor:pointer;">${icons.newmsg}</button>
        </div>
        ${threadRows || `<div style="padding:40px 0;text-align:center;">
          <div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px;">No messages yet</div>
          <div style="color:var(--text-muted);margin-bottom:20px;">Start a conversation with your teammates</div>
          <button class="btn-primary" style="width:auto;padding:12px 24px;" onclick="navigate('newconversation')">+ New message</button>
        </div>`}
      </div>
    </div>
  </div>`;
}

// ── CHAT SCREEN ───────────────────────────────────────────────────────────
function buildChat() {
  const thread = state.messages.find(m => m.id === state.activeChatId);
  if (!thread) return buildMessages();

  const name = getThreadName(thread);
  const otherUser = getThreadAvatar(thread);
  const isGroup = thread.isGroup;
  const searchQ = state.chatSearch.toLowerCase().trim();

  // Mark as read
  if (thread.unread) thread.unread[state.user.id] = 0;

  // Build bubbles
  let lastDate = null;
  const bubbles = thread.messages.map((msg, idx) => {
    // System messages (member added/removed)
    if (msg.system) {
      return `<div class="chat-date-divider" style="color:var(--text-muted);">${msg.text}</div>`;
    }

    const isMine = msg.from === state.user.id;
    const sender = state.users.find(u => u.id === msg.from);
    const msgDate = new Date(msg.ts).toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' });
    const showDate = msgDate !== lastDate;
    lastDate = msgDate;

    // Search highlight
    const matchesSearch = searchQ && (
      (msg.text && msg.text.toLowerCase().includes(searchQ))
    );

    // Sender avatar (group only, non-mine)
    let avatarHtml = '';
    if (!isMine && isGroup && sender) {
      avatarHtml = sender.avatar
        ? `<div class="chat-sender-avatar"><img src="${sender.avatar}"/></div>`
        : `<div class="chat-sender-avatar">${getInitials(sender.firstName, sender.lastName)}</div>`;
    }

    const senderName = isGroup && !isMine && sender
      ? `<div style="font-size:11px;color:var(--accent);font-weight:600;margin-bottom:2px;padding-left:2px;">${sender.nickname || sender.firstName}</div>`
      : '';

    // Reactions display
    const reactions = msg.reactions || {};
    const reactionChips = Object.entries(reactions).map(([emoji, userIds]) => {
      const iMine = userIds.includes(state.user.id);
      return `<span class="reaction-chip ${iMine ? 'mine' : ''}" onclick="toggleReaction('${msg.id}','${emoji}')">
        ${emoji}<span class="reaction-chip-count">${userIds.length}</span>
      </span>`;
    }).join('');

    // Emoji picker (shown when this message is selected)
    const showPicker = state.reactionPickerMsgId === msg.id;
    const EMOJIS = ['👍','❤️','😂','😮','😢','🙏'];
    const pickerHtml = showPicker ? `
      <div class="emoji-picker" style="${isMine ? 'right:0;' : 'left:0;'} bottom:calc(100% + 4px);">
        ${EMOJIS.map(e => `<span onclick="toggleReaction('${msg.id}','${e}'); closeReactionPicker()">${e}</span>`).join('')}
      </div>` : '';

    // Bubble content — image or text
    const bubbleContent = msg.image
      ? `<div class="chat-img-bubble"><img src="${msg.image}"/></div>`
      : `<div class="chat-bubble ${isMine ? 'mine' : 'theirs'} ${matchesSearch ? 'msg-highlighted' : ''}">${msg.text || ''}</div>`;

    return `
      ${showDate ? `<div class="chat-date-divider">${msgDate}</div>` : ''}
      <div class="chat-bubble-wrap ${isMine ? 'mine' : 'theirs'}" style="position:relative;">
        ${!isMine ? avatarHtml : ''}
        <div class="bubble-col ${isMine ? 'bubble-col-mine' : 'bubble-col-theirs'}">
          ${senderName}
          <div style="position:relative;">
            ${pickerHtml}
            ${bubbleContent}
          </div>
          <div class="chat-bubble-time" style="text-align:${isMine ? 'right' : 'left'};">${formatMsgTimestamp(msg.ts)}</div>
          ${reactionChips ? `<div class="reaction-bar">${reactionChips}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  const subLine = isGroup
    ? `${thread.participants.length} members`
    : (otherUser ? otherUser.role : '');

  // Search bar
  const searchBar = state.chatSearchActive ? `
    <div class="chat-search-bar">
      <input class="chat-search-input" id="chat-search-field" placeholder="Search messages…"
        value="${state.chatSearch}" oninput="setChatSearch(this.value)" autofocus/>
      <button onclick="closeChatSearch()" style="background:none;border:none;color:var(--text-muted);font-size:14px;cursor:pointer;">✕</button>
    </div>` : '';

  return `<div class="screen" style="overflow:hidden;">
    <div class="chat-header">
      <button class="chat-header-back" onclick="navigate('messages')">‹ Back</button>
      <div class="chat-header-info" onclick="navigate('chatinfo')" style="cursor:pointer;">
        ${buildUserAvatarHtml(isGroup ? null : otherUser, 36)}
        <div style="min-width:0;">
          <div class="chat-header-name">${name}</div>
          ${subLine ? `<div class="chat-header-sub">${subLine}</div>` : ''}
        </div>
      </div>
      <button onclick="openChatSearch()" style="background:none;border:none;color:var(--accent);cursor:pointer;padding:4px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
    ${searchBar}
    <div class="chat-screen">
      <div class="chat-messages" id="chat-messages-container">
        ${bubbles || '<div style="text-align:center;color:var(--text-dim);font-size:14px;margin-top:30px;padding:20px;">Start the conversation! 👋</div>'}
      </div>
      <div class="chat-input-row">
        <label class="chat-attach-btn" title="Share photo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <input type="file" accept="image/*" style="display:none;" onchange="sendImageMessage(event)"/>
        </label>
        <textarea class="chat-input" id="chat-input-field" placeholder="Message…" rows="1"
          onkeydown="chatKeyDown(event)" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"
        >${state.chatInput}</textarea>
        <button class="chat-send-btn" onclick="doSendChat()">${icons.send}</button>
      </div>
    </div>
  </div>`;
}

// ── CHAT INFO ─────────────────────────────────────────────────────────────
function buildChatInfo() {
  const thread = state.messages.find(m => m.id === state.activeChatId);
  if (!thread) return buildMessages();
  const isGroup = thread.isGroup;
  const name = getThreadName(thread);

  // Search for users to add (not already in thread)
  const addSearch = (state.chatInfoAddSearch || '').toLowerCase();
  const addCandidates = addSearch ? state.users.filter(u =>
    !thread.participants.includes(u.id) &&
    `${u.firstName} ${u.lastName}`.toLowerCase().includes(addSearch)
  ) : [];

  const memberRows = thread.participants.map(pid => {
    const u = state.users.find(u => u.id === pid);
    if (!u) return '';
    const avatarHtml = u.avatar
      ? `<div style="width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;"><img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;"/></div>`
      : `<div style="width:40px;height:40px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--accent);flex-shrink:0;">${getInitials(u.firstName, u.lastName)}</div>`;
    const isMe = u.id === state.user.id;
    return `<div class="member-row">
      ${avatarHtml}
      <div style="flex:1;min-width:0;">
        <div style="font-size:15px;font-weight:600;color:var(--text);">${u.firstName} ${u.lastName}${u.nickname ? ` (${u.nickname})` : ''}</div>
        <div style="font-size:12px;color:var(--text-muted);">${u.role}${isMe ? ' · You' : ''}</div>
      </div>
      ${isGroup && !isMe ? `<button class="member-remove-btn" onclick="removeMemberFromGroup('${u.id}')" title="Remove">✕</button>` : ''}
    </div>`;
  }).join('');

  return `<div class="screen">
    ${buildTopBanner({ title: isGroup ? 'Group Info' : 'Chat Info', showBack: true })}
    <div class="screen-scroll">
      <div class="chat-info-content">

        <!-- Avatar / name -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:8px 0;">
          ${buildUserAvatarHtml(isGroup ? null : state.users.find(u => u.id === thread.participants.find(p => p !== state.user.id)), 72)}
          ${isGroup ? `
            <div style="display:flex;align-items:center;gap:8px;">
              <input class="input-field" id="group-name-edit" value="${thread.name || ''}"
                placeholder="Group name" style="text-align:center;font-size:16px;font-weight:700;"
                oninput="thread_nameEdit(this.value)"/>
            </div>
            <button class="btn-secondary" style="padding:8px 20px;font-size:13px;" onclick="saveGroupName()">Save name</button>
          ` : `<div style="font-size:18px;font-weight:700;color:var(--text);">${name}</div>`}
        </div>

        <!-- Members -->
        <div>
          <div class="section-title" style="font-size:15px;margin-bottom:10px;">Members (${thread.participants.length})</div>
          <div style="display:flex;flex-direction:column;gap:8px;">${memberRows}</div>
        </div>

        ${isGroup ? `
        <!-- Add members -->
        <div>
          <div class="section-title" style="font-size:15px;margin-bottom:10px;">Add members</div>
          <div class="search-input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="input-field search-input" placeholder="Search by name…"
              value="${state.chatInfoAddSearch || ''}"
              oninput="setChatInfoAddSearch(this.value)"/>
          </div>
          ${addCandidates.length > 0 ? `
            <div style="display:flex;flex-direction:column;gap:8px;margin-top:10px;">
              ${addCandidates.map(u => `
                <div class="member-row" style="cursor:pointer;" onclick="addMemberToGroup('${u.id}')">
                  ${u.avatar
                    ? `<div style="width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;"><img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;"/></div>`
                    : `<div style="width:40px;height:40px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--accent);flex-shrink:0;">${getInitials(u.firstName, u.lastName)}</div>`}
                  <div style="flex:1;">
                    <div style="font-size:15px;font-weight:600;color:var(--text);">${u.firstName} ${u.lastName}</div>
                    <div style="font-size:12px;color:var(--text-muted);">${u.role}</div>
                  </div>
                  <div style="color:var(--accent);font-size:13px;font-weight:700;">+ Add</div>
                </div>`).join('')}
            </div>` : addSearch ? `<div style="font-size:13px;color:var(--text-muted);padding:8px 0;">No members found</div>` : ''}
        </div>

        <!-- Leave group -->
        <button class="btn-danger" onclick="leaveGroup()">Leave group</button>
        ` : ''}

        <div style="height:8px;"></div>
      </div>
    </div>
  </div>`;
}

// ── NEW CONVERSATION ──────────────────────────────────────────────────────
function buildNewConversation() {
  const search = state.contactSearch.toLowerCase();
  const others = state.users.filter(u =>
    u.id !== state.user.id &&
    (`${u.firstName} ${u.lastName}`.toLowerCase().includes(search) ||
     (u.nickname || '').toLowerCase().includes(search))
  );
  const selected = state.selectedContacts;

  const contacts = others.map(u => {
    const isSel = selected.includes(u.id);
    const avatarHtml = u.avatar
      ? `<div style="width:42px;height:42px;border-radius:50%;overflow:hidden;flex-shrink:0;"><img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;"/></div>`
      : `<div style="width:42px;height:42px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--accent);flex-shrink:0;">${getInitials(u.firstName, u.lastName)}</div>`;
    return `<div class="contact-pick-item ${isSel ? 'selected' : ''}" onclick="toggleContactSelect('${u.id}')">
      ${avatarHtml}
      <div style="flex:1;min-width:0;">
        <div class="contact-pick-name">${u.firstName} ${u.lastName}${u.nickname ? ` (${u.nickname})` : ''}</div>
        <div class="contact-pick-role">${u.role}</div>
      </div>
      ${isSel ? `<div style="width:22px;height:22px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg>
      </div>` : `<div style="width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;"></div>`}
    </div>`;
  }).join('');

  const canStart = selected.length > 0;
  const btnLabel = selected.length > 1 ? `Start group chat (${selected.length})` : 'Start conversation';

  return `<div class="screen">
    ${buildTopBanner({ title: 'New Message', showBack: true })}
    <div class="screen-scroll">
      <div class="new-convo-screen">
        <div class="search-input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="input-field search-input" id="contact-search" placeholder="Search by name…"
            value="${state.contactSearch}" oninput="setContactSearch(this.value)"/>
        </div>
        ${selected.length > 0 ? `
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${selected.map(id => {
              const u = state.users.find(u => u.id === id);
              return u ? `<div style="display:flex;align-items:center;gap:4px;background:var(--accent);color:#000;padding:4px 10px;border-radius:20px;font-size:13px;font-weight:600;">
                ${u.nickname || u.firstName}
                <span onclick="toggleContactSelect('${id}')" style="cursor:pointer;margin-left:2px;font-weight:700;">✕</span>
              </div>` : '';
            }).join('')}
          </div>
          ${selected.length > 1 ? `
            <div class="input-group">
              <label class="input-label">Group name</label>
              <input class="input-field" id="group-name" placeholder="e.g. Grade 1 Team Chat"
                value="${state.newGroupName || ''}" oninput="setNewGroupName(this.value)"/>
            </div>` : ''}
        ` : ''}
        <div style="font-size:13px;font-weight:600;color:var(--text-muted);padding:4px 0;">Club members</div>
        ${contacts || '<div class="empty-state">No members found</div>'}
        ${canStart ? `<button class="btn-primary" onclick="startConversation()">${btnLabel}</button>` : ''}
      </div>
    </div>
  </div>`;
}

function buildModal() {
  const m = state.modal;
  if (m.type === 'logout') {
    return `<div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">Log out?</div>
        <div class="modal-body">Are you sure you want to log out of your account?</div>
        <button class="btn-danger" onclick="confirmLogout()">Yes, log out</button>
        <button class="btn-secondary" onclick="closeModal(null, true)">Cancel</button>
      </div>
    </div>`;
  }
  if (m.type === 'deleteProfile') {
    return `<div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">Delete profile?</div>
        <div class="modal-body">This action is permanent. Your profile and all data will be removed.</div>
        <button class="btn-danger" onclick="confirmDeleteProfile()">Yes, delete my profile</button>
        <button class="btn-secondary" onclick="closeModal(null, true)">Cancel</button>
      </div>
    </div>`;
  }
  if (m.type === 'deleteEvent') {
    const ev = state.events.find(e => e.id === m.eventId);
    return `<div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">Delete event?</div>
        <div class="modal-body">Are you sure you want to delete "<strong>${ev?.title || 'this event'}</strong>"? This cannot be undone.</div>

        <button class="btn-secondary" onclick="closeModal(null, true)">Cancel</button>
      </div>
    </div>`;
  }
  if (m.type === 'trainingSession') {
    const ev = state.events.find(e => e.id === m.sessionId);
    if (!ev) return '';
    const isCancelled = ev.cancelled;
    const notifyChecked = m.notifyCancel !== false; // default true
    return `<div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal-sheet" style="max-height:85%;overflow-y:auto;">
        <div class="modal-handle"></div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
          <div style="color:var(--accent);">${icons.cricketBat}</div>
          <div class="modal-title" style="text-align:left;font-size:17px;">Training — ${formatDate(ev.date)}</div>
        </div>
        <div style="font-size:14px;color:var(--text-muted);margin-bottom:4px;">${ev.time} – ${ev.finishTime} &nbsp;·&nbsp; ${ev.location}</div>

        ${isCancelled ? `
          <div style="background:rgba(224,85,85,0.1);border-radius:12px;padding:12px;margin-bottom:4px;">
            <div style="color:var(--red);font-weight:700;font-size:14px;">Session cancelled</div>
            ${ev.cancelNote ? `<div style="font-size:13px;color:var(--text-muted);margin-top:4px;">${ev.cancelNote}</div>` : ''}
          </div>
          <button class="btn-secondary" onclick="reinstateSession('${ev.id}')">Reinstate session</button>
        ` : `
          <div style="display:flex;flex-direction:column;gap:12px;">

            <div>
              <div class="input-label" style="margin-bottom:8px;">Edit session details</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
                <div class="input-group">
                  <label class="input-label" style="font-size:11px;">Start time</label>
                  <input class="input-field" type="time" id="ts-modal-start" value="${ev.time}" style="padding:10px 12px;font-size:13px;"/>
                </div>
                <div class="input-group">
                  <label class="input-label" style="font-size:11px;">Finish time</label>
                  <input class="input-field" type="time" id="ts-modal-finish" value="${ev.finishTime}" style="padding:10px 12px;font-size:13px;"/>
                </div>
              </div>
              <input class="input-field" id="ts-modal-location" value="${ev.location}" placeholder="Location" style="margin-bottom:10px;font-size:13px;"/>
              <div class="notif-option" style="margin-bottom:10px;" onclick="toggleModalNotify()">
                <div class="notif-checkbox ${notifyChecked ? 'checked' : ''}" id="ts-modal-notify-edit-box">
                  ${notifyChecked ? `<svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg>` : ''}
                </div>
                <span class="notif-label" style="font-size:13px;">Notify members of changes</span>
              </div>
              <button class="btn-secondary" onclick="amendSession('${ev.id}')">Save changes</button>
            </div>

            <div style="height:1px;background:var(--border);"></div>

            <div>
              <div class="input-label" style="margin-bottom:8px;color:var(--red);">Cancel this session</div>
              <input class="input-field" id="ts-cancel-note" placeholder="Reason for cancellation (optional)" style="margin-bottom:10px;font-size:13px;"/>
              <div class="notif-option" style="margin-bottom:10px;" onclick="toggleModalCancelNotify()">
                <div class="notif-checkbox ${notifyChecked ? 'checked' : ''}" id="ts-modal-cancel-notify-box">
                  ${notifyChecked ? `<svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg>` : ''}
                </div>
                <span class="notif-label" style="font-size:13px;">Notify members of cancellation</span>
              </div>
              <button class="btn-danger" onclick="cancelSession('${ev.id}')">Cancel this session</button>
            </div>

          </div>
        `}
        <button class="btn-secondary" onclick="closeModal(null, true)" style="margin-top:4px;">Close</button>
      </div>
    </div>`;
  }
  if (m.type === 'toast') {
    return `<div style="position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:var(--teal);color:#000;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:700;z-index:60;white-space:nowrap;">${m.message}</div>`;
  }
  return '';
}

window.generateEventImage = async () => {
  const prompt = document.getElementById('ce-ai-prompt')?.value.trim();
  if (!prompt) { showToast('Please enter a prompt first.'); return; }
  state.createEventForm.aiPrompt     = prompt;
  state.createEventForm.aiGenerating = true;
  render();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        messages: [{
          role: 'user',
          content: `Generate an SVG image for a cricket club event. The prompt is: "${prompt}". 
          Return ONLY a complete SVG element (starting with <svg and ending with </svg>), no explanation, no markdown, no code blocks.
          Make it colourful, visually appealing, suitable as an event banner (landscape, 4:2 ratio).
          Use rich colours, gradients, and cricket/sports imagery relevant to the prompt.`
        }]
      })
    });
    const data = await response.json();
    const text = data.content?.[0]?.text || '';
    // Extract SVG from response
    const svgMatch = text.match(/<svg[\s\S]*<\/svg>/i);
    if (svgMatch) {
      // Convert SVG to data URL
      const svgBlob = new Blob([svgMatch[0]], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(svgBlob);
      state.createEventForm.aiImage     = url;
      state.createEventForm.image       = null;
      state.createEventForm.aiGenerating = false;
      render();
    } else {
      throw new Error('No SVG in response');
    }
  } catch (err) {
    // Fallback: generate a nice placeholder SVG locally
    state.createEventForm.aiImage = generatePlaceholderEventImage(prompt);
    state.createEventForm.image = null;
    state.createEventForm.aiGenerating = false;
    render();
  }
};

function generatePlaceholderEventImage(prompt) {
  // A cricket-themed gradient SVG as a stylish fallback
  const colors = [
    ['#1a1a2e','#16213e','#0f3460','#e94560'],
    ['#0d1117','#1f4037','#99f2c8','#1f4037'],
    ['#141e30','#243b55','#4ecdc4','#ff6b6b'],
    ['#0f0c29','#302b63','#24243e','#7b2ff7'],
  ];
  const c = colors[Math.floor(Math.random() * colors.length)];
  const words = prompt.split(' ').slice(0, 4).join(' ');
  const svg = `<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:${c[0]}"/>
        <stop offset="50%" style="stop-color:${c[1]}"/>
        <stop offset="100%" style="stop-color:${c[2]}"/>
      </linearGradient>
    </defs>
    <rect width="400" height="200" fill="url(#bg)"/>
    <circle cx="320" cy="60" r="50" fill="${c[3]}" opacity="0.15"/>
    <circle cx="80" cy="150" r="70" fill="${c[2]}" opacity="0.1"/>
    <!-- Cricket ball -->
    <circle cx="200" cy="90" r="35" fill="${c[3]}" opacity="0.9"/>
    <circle cx="200" cy="90" r="31" fill="${c[3]}cc"/>
    <path d="M178 90 Q200 78 222 90" stroke="white" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M178 90 Q200 102 222 90" stroke="white" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M190 72 Q200 90 190 108" stroke="white" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M210 72 Q200 90 210 108" stroke="white" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- Text -->
    <text x="200" y="148" text-anchor="middle" fill="white" font-size="13" font-weight="700" font-family="Arial,sans-serif" opacity="0.9">${words}</text>
    <text x="200" y="166" text-anchor="middle" fill="${c[2]}" font-size="9" font-family="Arial,sans-serif" opacity="0.7">AI GENERATED IMAGE</text>
  </svg>`;
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  return URL.createObjectURL(blob);
}

window.startConversation = async () => {
  const selected = state.selectedContacts;
  if (selected.length === 0) return;

  const participants = [state.user.id, ...selected];
  const isGroup = selected.length > 1;

  // Check if 1:1 conversation already exists
  if (!isGroup) {
    const existing = state.messages.find(t =>
      !t.isGroup &&
      t.participants.includes(state.user.id) &&
      t.participants.includes(selected[0])
    );
    if (existing) {
      state.selectedContacts = [];
      state.contactSearch = '';
      openChat(existing.id);
      return;
    }
  }

  const groupName = isGroup ? (state.newGroupName || 'Group Chat') : null;

  // Persist thread to Supabase first to get real UUID
  const rows = await sb.insert('threads', {
    is_group: isGroup,
    name: groupName,
    participants,
  });

  const realId = Array.isArray(rows) && rows[0]?.id ? rows[0].id : ('m' + Date.now());

  const newThread = {
    id: realId,
    isGroup,
    participants,
    name: groupName,
    messages: [],
    unread: Object.fromEntries(participants.map(id => [id, 0])),
  };
  state.messages.unshift(newThread);
  state.selectedContacts = [];
  state.contactSearch = '';
  state.newGroupName = '';
  openChat(newThread.id);
};

window.generateTrainingSchedule = () => {
  const f = state.trainingScheduleForm;
  if (f.days.length === 0) { state.error = 'Please select at least one training day.'; render(); return; }
  if (!f.commenceDate || !f.concludeDate) { state.error = 'Please set commence and conclude dates.'; render(); return; }
  if (!f.startTime || !f.finishTime) { state.error = 'Please set start and finish times.'; render(); return; }
  if (f.concludeDate < f.commenceDate) { state.error = 'Conclude date must be after commence date.'; render(); return; }

  // Day name → JS getDay() index (0=Sun)
  const DAY_MAP = { Sun:0, Mon:1, Tue:2, Wed:3, Thu:4, Fri:5, Sat:6 };
  const selectedDayNums = f.days.map(d => DAY_MAP[d]);

  // Helper: format a Date as YYYY-MM-DD in LOCAL time (not UTC)
  function toLocalDateStr(d) {
    const yyyy = d.getFullYear();
    const mm   = String(d.getMonth() + 1).padStart(2, '0');
    const dd   = String(d.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  state.events = state.events.filter(e => !(e.type === 'training' && e.fromSchedule));
  // Also delete old schedule events from Supabase
  sb.select('events', 'type=eq.training&from_schedule=eq.true').then(rows => {
    if (Array.isArray(rows)) rows.forEach(r => sb.delete('events', { id: r.id }));
  });

  // Parse as local midnight (avoids UTC-shift bug)
  const [sy, sm, sd] = f.commenceDate.split('-').map(Number);
  const [ey, em, ed] = f.concludeDate.split('-').map(Number);
  const start  = new Date(sy, sm - 1, sd);
  const finish = new Date(ey, em - 1, ed);
  const sessions = [];
  const cur = new Date(start);

  while (cur <= finish) {
    if (selectedDayNums.includes(cur.getDay())) {
      const dateStr = toLocalDateStr(cur);
      sessions.push({
        id: 'tr' + dateStr.replace(/-/g,'') + Math.random().toString(36).slice(2,5),
        type: 'training',
        fromSchedule: true,
        title: 'Training Session',
        date: dateStr,
        time: f.startTime,
        finishTime: f.finishTime,
        location: f.location || 'Club Oval — Nets',
        description: '',
        cost: 0,
        rsvp: {},
        cancelled: false,
        cancelNote: '',
        reminder: f.reminder,
      });
    }
    cur.setDate(cur.getDate() + 1);
  }

  state.events.push(...sessions);
  // Persist all new sessions to Supabase
  sb.insert('events', sessions.map(s => ({
    type: 'training',
    title: s.title,
    date: s.date,
    time: s.time,
    finish_time: s.finishTime,
    location: s.location,
    description: s.description || '',
    cost: 0,
    cancelled: false,
    from_schedule: true,
  })));
  state.error = '';
  // Navigate to Training tab in Events
  state.activeTab = 'events';
  state.eventsTab = 'training';
  state.eventsFilter = 'upcoming';
  state.screen = 'events';
  showToast(`${sessions.length} sessions generated!`);
  render();
};

// ── PLAYHQ API PROXY ─────────────────────────────────────────────────────
// In Live mode, requests go through your Cloudflare Worker (avoids CORS).
// Replace the URL below with your deployed Worker URL after setup.
const PLAYHQ_PROXY = 'https://playhq-proxy.YOUR_SUBDOMAIN.workers.dev';

async function playHQGet(path) {
  const res = await fetch(`${PLAYHQ_PROXY}${path}`);
  if (!res.ok) throw new Error(`PlayHQ API error ${res.status}`);
  return res.json();
}

window.setImportMode = (mode) => {
  state.importFixture.mode = mode;
  state.importFixture.error = '';
  render();
};

window.importGoStep = (step) => {
  state.importFixture.step = step;
  state.importFixture.error = '';
  render();
};

window.selectImportSeason = (id) => {
  state.importFixture.selectedSeasonId = id;
  render();
};

window.toggleImportGrade = (id) => {
  const ids = state.importFixture.selectedGradeIds;
  const idx = ids.indexOf(id);
  if (idx >= 0) ids.splice(idx, 1);
  else ids.push(id);
  render();
};

window.importFetchSeasons = async () => {
  const s = state.importFixture;
  if (s.mode === 'live' && (!s.apiKey || !s.orgId)) {
    state.importFixture.error = 'Please enter your API Key and Organisation ID.';
    render(); return;
  }
  state.importFixture.loading = true;
  state.importFixture.error = '';
  render();

  try {
    let seasons;
    if (s.mode === 'mock') {
      await new Promise(r => setTimeout(r, 800)); // simulate latency
      seasons = MOCK_PHQ_SEASONS;
    } else {
      const data = await playHQGet(`/v1/organisations/${s.orgId}/seasons`);
      seasons = data.data;
    }
    state.importFixture.seasons = seasons;
    state.importFixture.selectedSeasonId = seasons[0]?.id || '';
    state.importFixture.step = 2;
  } catch(e) {
    state.importFixture.error = `Failed to fetch seasons: ${e.message}`;
  }
  state.importFixture.loading = false;
  render();
};

window.importFetchGrades = async () => {
  const s = state.importFixture;
  if (!s.selectedSeasonId) { state.importFixture.error = 'Please select a season.'; render(); return; }
  state.importFixture.loading = true;
  state.importFixture.error = '';
  render();

  try {
    let grades;
    if (s.mode === 'mock') {
      await new Promise(r => setTimeout(r, 600));
      grades = MOCK_PHQ_GRADES;
    } else {
      const data = await playHQGet(`/v1/seasons/${s.selectedSeasonId}/grades`);
      grades = data.data;
    }
    state.importFixture.grades = grades;
    state.importFixture.selectedGradeIds = [];   // reset multi-select
    state.importFixture.step = 3;
  } catch(e) {
    state.importFixture.error = `Failed to fetch grades: ${e.message}`;
  }
  state.importFixture.loading = false;
  render();
};

window.importFetchFixtures = async () => {
  const s = state.importFixture;
  if (!s.selectedGradeIds.length) { state.importFixture.error = 'Please select at least one grade.'; render(); return; }
  state.importFixture.loading = true;
  state.importFixture.error = '';
  render();

  try {
    const fixturesByGrade = {};
    if (s.mode === 'mock') {
      await new Promise(r => setTimeout(r, 700));
      const seasonData = MOCK_PHQ_FIXTURES[s.selectedSeasonId] || {};
      for (const gradeId of s.selectedGradeIds) {
        const grade = s.grades.find(g => g.id === gradeId);
        fixturesByGrade[gradeId] = {
          name: grade?.name || gradeId,
          fixtures: (seasonData[gradeId] || []),
        };
      }
    } else {
      for (const gradeId of s.selectedGradeIds) {
        const grade = s.grades.find(g => g.id === gradeId);
        const data = await playHQGet(`/v1/grades/${gradeId}/fixture`);
        fixturesByGrade[gradeId] = {
          name: grade?.name || gradeId,
          fixtures: data.data.map(g => ({
            id: g.id,
            round: g.round?.roundNumber,
            homeTeam: g.homeTeam?.name || 'TBC',
            awayTeam: g.awayTeam?.name || 'TBC',
            date: g.dateTime?.split('T')[0] || '',
            time: g.dateTime?.split('T')[1]?.slice(0,5) || '',
            venue: g.venue?.name || 'TBC',
          })),
        };
      }
    }
    state.importFixture.fixturesByGrade = fixturesByGrade;
    // Pre-select all fixtures across all grades
    state.importFixture.selectedFixtureIds = Object.values(fixturesByGrade).flatMap(g => g.fixtures.map(f => f.id));
    state.importFixture.step = 4;
  } catch(e) {
    state.importFixture.error = `Failed to fetch fixtures: ${e.message}`;
  }
  state.importFixture.loading = false;
  render();
};

window.toggleFixtureSelect = (id) => {
  const ids = state.importFixture.selectedFixtureIds;
  const idx = ids.indexOf(id);
  if (idx >= 0) ids.splice(idx, 1);
  else ids.push(id);
  render();
};

window.selectAllFixtures = () => {
  const s = state.importFixture;
  const allIds = Object.values(s.fixturesByGrade).flatMap(g => g.fixtures.map(f => f.id));
  if (s.selectedFixtureIds.length === allIds.length) {
    s.selectedFixtureIds = [];
  } else {
    s.selectedFixtureIds = allIds;
  }
  render();
};

window.toggleAllGradeFixtures = (gradeId) => {
  const s = state.importFixture;
  const gradeFixtures = s.fixturesByGrade[gradeId]?.fixtures || [];
  const gradeIds = gradeFixtures.map(f => f.id);
  const allSel = gradeIds.every(id => s.selectedFixtureIds.includes(id));
  if (allSel) {
    s.selectedFixtureIds = s.selectedFixtureIds.filter(id => !gradeIds.includes(id));
  } else {
    const existing = new Set(s.selectedFixtureIds);
    gradeIds.forEach(id => existing.add(id));
    s.selectedFixtureIds = [...existing];
  }
  render();
};

window.importConfirm = () => {
  const s = state.importFixture;
  let importCount = 0;

  // Iterate all grades and their fixtures
  Object.entries(s.fixturesByGrade).forEach(([gradeId, gradeData]) => {
    const grade = s.grades.find(g => g.id === gradeId);
    gradeData.fixtures
      .filter(f => s.selectedFixtureIds.includes(f.id))
      .forEach(fix => {
        if (state.events.find(e => e.playHQId === fix.id)) return; // skip duplicates
        state.events.push({
          id: 'phq_' + fix.id,
          playHQId: fix.id,
          type: 'match',
          grade: gradeData.name,           // stored for grouping in Matches tab
          gradeId,
          title: `${fix.homeTeam} vs ${fix.awayTeam}`,
          date: fix.date,
          time: fix.time || '10:00',
          location: fix.venue,
          description: `Round ${fix.round || '—'} · ${gradeData.name} · Imported from PlayHQ`,
          cost: 0,
          rsvp: {},
          team: [],
          round: fix.round,
          homeTeam: fix.homeTeam,
          awayTeam: fix.awayTeam,
        });
        importCount++;
      });
  });

  state.events.sort((a, b) => a.date > b.date ? 1 : -1);

  // Smart filter — show upcoming if any, else past
  const allImported = Object.values(s.fixturesByGrade)
    .flatMap(g => g.fixtures)
    .filter(f => s.selectedFixtureIds.includes(f.id));
  state.eventsFilter = allImported.some(f => isUpcoming(f.date)) ? 'upcoming' : 'past';

  // Reset import state
  state.importFixture = {
    apiKey: s.apiKey, orgId: s.orgId, mode: s.mode,
    step: 1, seasons: [], selectedSeasonId: '',
    grades: [], selectedGradeIds: [],
    fixturesByGrade: {}, selectedFixtureIds: [],
    loading: false, error: '',
  };

  state.activeTab = 'events';
  state.eventsTab = 'matches';
  state.screen = 'events';
  showToast(`${importCount} fixture${importCount !== 1 ? 's' : ''} imported!`);
  render();
};

// ── PUSH NOTIFICATIONS (OneSignal via Cloudflare Worker) ─────────────────
// Replace the URL below with your deployed onesignal-worker URL after setup.
// The Worker holds your API keys securely and avoids CORS issues.
const ONESIGNAL_WORKER_URL = 'https://onesignal-proxy.thomsonseth.workers.dev';

// Request permission from the user after they log in
async function requestNotificationPermission() {
  try {
    if (window.OneSignal) {
      await window.OneSignal.Notifications.requestPermission();
    }
  } catch(e) {
    console.log('Notification permission request failed:', e);
  }
}

async function sendPushNotification(title, message, url = '/') {
  if (!ONESIGNAL_WORKER_URL) return;
  try {
    await fetch(ONESIGNAL_WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        included_segments: ['All'],
        headings: { en: title },
        contents: { en: message.substring(0, 200) },
        url,
      }),
    });
  } catch(e) {
    console.log('Push notification failed:', e);
  }
}

// Send push notification to specific users only (by Supabase user ID = OneSignal external_user_id)
async function sendPushNotificationToUsers(title, message, url, userIds) {
  if (!ONESIGNAL_WORKER_URL || !userIds?.length) return;
  try {
    await fetch(ONESIGNAL_WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        include_aliases: { external_id: userIds },
        target_channel: 'push',
        headings: { en: title },
        contents: { en: message.substring(0, 200) },
        url,
      }),
    });
  } catch(e) {
    console.log('Targeted push notification failed:', e);
  }
}

// ── REAL-TIME MESSAGE POLLING ─────────────────────────────────────────────
// Poll Supabase every 5 seconds for new messages while logged in
let _pollInterval = null;
let _lastEventPoll = 0;
let _lastAnnPoll = 0;

async function pollAll() {
  if (!state.user || !sb._token) return;

  const now = Date.now();

  // ── Poll events every 10s ─────────────────────────────────────────────
  if (now - _lastEventPoll > 10000) {
    _lastEventPoll = now;
    try {
      const evRows = await sb.select('events', 'order=date.asc');
      if (Array.isArray(evRows)) {
        const existingIds = new Set(state.events.map(e => e.id));
        let changed = false;

        evRows.forEach(r => {
          const mapped = rowToEvent(r);
          if (!existingIds.has(r.id)) {
            // New event — add it
            state.events.push(mapped);
            changed = true;
          } else {
            // Existing event — check for changes
            const local = state.events.find(e => e.id === r.id);
            if (local) {
              const fields = ['title','date','time','finishTime','location','description','cost','cancelled','cancelNote'];
              fields.forEach(f => {
                if (local[f] !== mapped[f]) { local[f] = mapped[f]; changed = true; }
              });
            }
          }
        });

        // Refresh RSVPs
        const rsvps = await sb.select('rsvps', '');
        if (Array.isArray(rsvps)) {
          state.events.forEach(e => e.rsvp = {});
          rsvps.forEach(r => {
            const ev = state.events.find(e => e.id === r.event_id);
            if (ev) ev.rsvp[r.user_id] = r.status;
          });
          changed = true;
        }

        if (changed) render();
      }
    } catch(e) { console.log('Event poll error:', e); }
  }

  // ── Poll announcements every 15s ──────────────────────────────────────
  if (now - _lastAnnPoll > 15000) {
    _lastAnnPoll = now;
    try {
      const annRows = await sb.select('announcements', 'order=created_at.desc');
      if (Array.isArray(annRows)) {
        const existingIds = new Set(state.announcements.map(a => a.id));
        let changed = false;
        annRows.forEach(a => {
          if (!existingIds.has(a.id)) {
            state.announcements.unshift({
              id: a.id, title: a.title, body: a.body,
              image: a.image_url || null,
              date: a.created_at ? a.created_at.slice(0,10) : '',
              author: a.author_name || 'Admin',
              recipients: a.recipients || 'all',
            });
            changed = true;
          }
        });
        if (changed) render();
      }
    } catch(e) { console.log('Announcement poll error:', e); }
  }

  // ── Poll messages every 5s ────────────────────────────────────────────
  try {
    const threads = await sb.select('threads', 'order=created_at.asc');
    if (!Array.isArray(threads)) return;

    const myThreads = threads.filter(t =>
      Array.isArray(t.participants) && t.participants.includes(state.user.id)
    );
    if (myThreads.length === 0) return;

    const threadIds = myThreads.map(t => `"${t.id}"`).join(',');
    const msgs = await sb.select('messages', `thread_id=in.(${threadIds})&order=created_at.asc`);
    if (!Array.isArray(msgs)) return;

    let gotNew = false;
    let newMsgFrom = null;
    let newMsgText = '';
    let newMsgThread = null;

    myThreads.forEach(t => {
      const threadMsgs = msgs.filter(m => m.thread_id === t.id);
      let existing = state.messages.find(m => m.id === t.id);

      if (!existing) {
        existing = {
          id: t.id, isGroup: t.is_group, name: t.name || null,
          participants: t.participants || [], messages: [],
          unread: Object.fromEntries((t.participants || []).map(p => [p, 0])),
        };
        state.messages.unshift(existing);
      }

      const existingIds = new Set(existing.messages.map(m => m.id));
      threadMsgs.forEach(m => {
        if (existingIds.has(m.id)) return;
        existingIds.add(m.id);
        const newMsg = {
          id: m.id,
          from: m.is_system ? 'system' : m.from_id,
          text: m.text || '',
          image: m.image_url || null,
          system: m.is_system || false,
          reactions: m.reactions || {},
          ts: new Date(m.created_at).getTime(),
        };
        existing.messages.push(newMsg);

        if (m.from_id !== state.user.id) {
          existing.unread[state.user.id] = (existing.unread[state.user.id] || 0) + 1;
          gotNew = true;
          if (!newMsgFrom) {
            newMsgFrom = m.from_id;
            newMsgText = m.text || '';
            newMsgThread = existing;
          }
        }
      });
    });

    if (gotNew) {
      if (newMsgFrom && newMsgThread) {
        const sender = state.users.find(u => u.id === newMsgFrom);
        const senderName = sender ? (sender.nickname || sender.firstName) : 'Someone';
        const threadName = newMsgThread.isGroup ? (newMsgThread.name || 'Group Chat') : senderName;
        sendPushNotification(
          `Message from ${senderName}`,
          newMsgText.substring(0, 200),
          `https://generic-generals.netlify.app/#screen=chat&id=${newMsgThread.id}`,
        );
      }
      render();
    }
  } catch(e) { console.log('Message poll error:', e); }
}

function startPolling() {
  if (_pollInterval) clearInterval(_pollInterval);
  _pollInterval = setInterval(pollAll, 5000);
}

function stopPolling() {
  if (_pollInterval) { clearInterval(_pollInterval); _pollInterval = null; }
}

// ── DEEP LINK HANDLER ─────────────────────────────────────────────────────
// Reads URL hash params set by push notifications e.g. #screen=eventdetail&id=abc
function handleDeepLink() {
  const hash = window.location.hash.slice(1); // remove leading #
  if (!hash || !state.user) return;
  const params = Object.fromEntries(new URLSearchParams(hash));
  const screen = params.screen;
  const id = params.id;
  if (!screen) return;

  if (screen === 'eventdetail' && id) {
    state.activeEventId = id;
    state.prevScreen = 'events';
    state.activeTab = 'events';
    navigate('eventdetail');
  } else if (screen === 'announcements') {
    state.activeTab = 'home';
    navigate('announcements');
    state.prevScreen = 'home';
  } else if (screen === 'chat' && id) {
    openChat(id);
  }
  // Clear the hash so it doesn't re-navigate on refresh
  window.history.replaceState(null, '', window.location.pathname);
  render();
}

// ── BOOT ──────────────────────────────────────────────────────────────────
(async () => {
  render();
  const restored = await tryRestoreSession();
  if (restored) {
    navigate('home');
    state.activeTab = 'home';
    startPolling();
    // Handle deep link from notification
    setTimeout(handleDeepLink, 300);
  }
  render();
})();
</script>
</body>
</html>
